<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 26th, Wanderer 🌍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#1c1440;
    --sky-mid:#4a2f72;
    --sky-low:#e8744f;
    --cream:#f7ecd9;
    --film-frame:#fffdf6;
    --mint:#8fd3c7;
    --gold:#f3c34d;
    --ink:#2b1e2e;
    --rose:#e8607d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; min-height:100%;
    overflow-x:hidden;
    font-family:'Quicksand',sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 45%,var(--sky-low) 100%);
    color:var(--ink);
  }
  .stage{
    position:relative; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:40px 16px 80px;
  }

  .header{ text-align:center; z-index:5; margin-bottom:6px; color:var(--cream); }
  .header .eyebrow{ font-family:'Caveat',cursive; font-size:1.6rem; color:var(--gold); letter-spacing:1px; }
  .header h1{
    font-family:'Playfair Display',serif; font-style:italic; font-weight:700;
    font-size:clamp(2rem,5vw,3.4rem); margin:4px 0 6px;
    text-shadow:0 4px 18px rgba(0,0,0,.35);
  }
  .header p{ font-size:1rem; opacity:.88; max-width:520px; margin:0 auto; }

  .wonders-sky{ position:absolute; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
  .stars{
    position:absolute; inset:0;
    background-image:radial-gradient(2px 2px at 20% 20%, #fff 99%, transparent),
                      radial-gradient(2px 2px at 70% 10%, #fff 99%, transparent),
                      radial-gradient(1.5px 1.5px at 40% 35%, #fff 99%, transparent),
                      radial-gradient(2px 2px at 85% 28%, #fff 99%, transparent),
                      radial-gradient(1.5px 1.5px at 55% 15%, #fff 99%, transparent),
                      radial-gradient(2px 2px at 10% 45%, #fff 99%, transparent);
    opacity:.55; animation:twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.25;} to{opacity:.75;}}

  .skyline{ position:absolute; bottom:0; left:0; width:100%; height:46%; display:flex; align-items:flex-end; justify-content:center; }
  .skyline svg{ width:100%; height:100%; display:block; }
  .ground-line{ stroke:var(--cream); stroke-width:2; opacity:.5; }
  .wonder-mark{ fill:none; stroke:var(--cream); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; opacity:.92; }
  .wonder-mark.accent{ stroke:var(--gold); }
  .tower-mark{ fill:none; stroke:var(--cream); stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; }
  .blink{ animation:blink 1.8s ease-in-out infinite; }
  @keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}
  .bob{ animation:bob 4.5s ease-in-out infinite; transform-origin:center; }
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .sway-slow{ animation:swaySlow 6s ease-in-out infinite; transform-origin:bottom center; }
  @keyframes swaySlow{0%,100%{transform:rotate(-0.4deg);}50%{transform:rotate(0.4deg);}}

  .flyer{ position:absolute; animation:flyAcross linear infinite; }
  @keyframes flyAcross{ from{transform:translateX(-10vw);} to{transform:translateX(110vw);} }
  .walker{ position:absolute; animation:walkAcross linear infinite; }
  @keyframes walkAcross{ from{transform:translateX(-60px);} to{transform:translateX(calc(100vw + 60px));} }

  /* ---------- Camera Scene ---------- */
  .camera-zone{ position:relative; z-index:4; margin-top:14px; display:flex; flex-direction:column; align-items:center; }
  .scene3d{ perspective:1800px; width:min(92vw,420px); }
  .camera{
    position:relative; width:100%; aspect-ratio:300/320;
    transform-style:preserve-3d; transition:transform 1.1s cubic-bezier(.6,.1,.2,1);
  }
  .camera.flipped{ transform:rotateY(180deg); }
  .face{ position:absolute; inset:0; backface-visibility:hidden; }
  .face svg{ width:100%; height:100%; display:block; filter:drop-shadow(0 28px 38px rgba(0,0,0,.5)); }

  /* FRONT FACE */
  .face-front{ display:flex; align-items:center; justify-content:center; }
  .power-btn{
    position:absolute;
    left:71.6%; top:69.7%; width:18%; aspect-ratio:1/1; border-radius:50%;
    background:transparent; border:none; cursor:pointer; transition:transform .15s ease;
  }
  .power-btn:hover{ transform:scale(1.08); }
  .power-btn:active{ transform:scale(.92); }
  .power-btn.pulsing::after{
    content:""; position:absolute; inset:-6px; border-radius:50%;
    border:2px solid var(--gold); animation:pulse-ring 1.7s ease-out infinite;
  }
  @keyframes pulse-ring{ 0%{ transform:scale(.85); opacity:.9; } 100%{ transform:scale(1.6); opacity:0; } }
  .shutter-tag{
    position:absolute; bottom:-26px; left:50%; transform:translateX(-50%);
    font-family:'Caveat',cursive; color:var(--cream); font-size:1rem; opacity:.8; white-space:nowrap;
  }
  .frontFlash{ position:absolute; inset:0; border-radius:16%; background:#fff; opacity:0; pointer-events:none; }
  .frontFlash.fire{ animation:flashpop .5s ease-out; }
  @keyframes flashpop{ 0%{opacity:0;} 15%{opacity:1;} 100%{opacity:0;} }

  /* BACK FACE */
  .face-back{ transform:rotateY(180deg); display:flex; align-items:center; justify-content:center; }
  .back-stage{ position:relative; width:100%; height:100%; }
  .photo-screen{
    position:absolute; left:6.7%; top:7.5%; width:70%; height:75%;
    background:#101012; border-radius:9px;
    box-shadow:inset 0 0 0 4px #0a0a0c, inset 0 0 18px rgba(0,0,0,.8);
    overflow:hidden;
  }
  .screen-flash{ position:absolute; inset:0; background:#fff; opacity:0; z-index:5; }
  .screen-flash.fire{ animation:flashpop .55s ease-out; }
  .film-frame{
    position:absolute; inset:0; display:flex; flex-direction:column;
    opacity:0; transform:scale(.85); transition:opacity .5s ease, transform .5s ease;
    background:var(--film-frame);
  }
  .film-frame.show{ opacity:1; transform:scale(1); }
  .film-photo{ flex:1; overflow:hidden; position:relative; background:#ddd; }
  .film-photo img, .film-photo video{ width:100%; height:110%; object-fit:cover; display:block; }
  .film-caption{ font-family:'Caveat',cursive; font-size:.6rem; text-align:center; color:#444; padding:2px 2px 4px; background:var(--film-frame); }
  .card-frame{
  position:absolute; inset:0; border-radius:8px;
  overflow:hidden;
  opacity:0; transform:scale(.85); transition:opacity .5s ease, transform .5s ease;
}
.card-frame.show{ opacity:1; transform:scale(1); }
.card-frame img{ width:100%; height:100%; object-fit:cover; display:block; }

  .controls-col{ position:absolute; left:79%; top:7.5%; width:17%; height:75%; display:flex; flex-direction:column; align-items:stretch; justify-content:center; gap:10%; }
  .ctrl-btn{
  border:none; border-radius:9px; padding:9% 3%;
  font-family:'Quicksand',sans-serif; font-weight:700; font-size:clamp(.46rem,1.5vw,.62rem);
  cursor:pointer; background:linear-gradient(160deg,#fefefe,#d8d8da); color:#2b2b2e;
  box-shadow:0 4px 9px rgba(0,0,0,.4), inset 0 -2px 3px rgba(0,0,0,.15);
  transition:transform .15s ease; letter-spacing:.3px;
}
#offBtn{
  aspect-ratio:1/1;
  width:78%;
  margin:0 auto;
  border-radius:50%;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.05;
  background:linear-gradient(160deg,#ffd3df,#e8607d);
  color:#fff;
  font-size:clamp(.42rem,1.3vw,.56rem);
}
  .ctrl-btn:hover{ transform:translateY(-2px); }
  .ctrl-btn:active{ transform:translateY(1px); }
  .ctrl-btn.next-btn,
  .ctrl-btn.cview-btn{
    aspect-ratio:1/1;
    width:78%;
    margin:0 auto;
    border-radius:50%;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    line-height:1.05;
  }
  .ctrl-btn.next-btn{ background:linear-gradient(160deg,#fff4d6,var(--gold)); color:#4a330b; }
  .ctrl-btn.cview-btn{ background:linear-gradient(160deg,#d9f5ee,var(--mint)); color:#0d4f44; font-size:clamp(.42rem,1.3vw,.56rem); }
  .ctrl-btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
  .counter{ display:none; }

  .cview-pop{
    position:absolute; left:6.7%; top:85%; width:70%;
    background:var(--film-frame); border-radius:10px; padding:5% 6%;
    box-shadow:0 12px 26px rgba(0,0,0,.5);
    font-family:'Caveat',cursive; font-size:.62rem; color:#4a3a30; text-align:center;
    opacity:0; transform:translateY(6px); pointer-events:none;
    transition:opacity .3s ease, transform .3s ease; z-index:50;
  }
  .cview-pop.show{ opacity:1; transform:translateY(0); pointer-events:auto; }

  .hint{ margin-top:34px; color:var(--cream); font-family:'Caveat',cursive; font-size:1.2rem; opacity:.85; text-align:center; z-index:4; }
  .progress-dots{ display:flex; gap:8px; margin-top:16px; z-index:4; }
  .progress-dots span{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.25); transition:background .3s ease, transform .3s ease; }
  .progress-dots span.active{ background:var(--gold); transform:scale(1.3); }

  footer{ margin-top:50px; text-align:center; color:rgba(255,255,255,.55); font-size:.8rem; z-index:4; }
  footer .heart{ color:var(--rose); }

  .hello-overlay{
    position:fixed; inset:0; background:#000;
    display:flex; align-items:center; justify-content:center;
    z-index:999; opacity:0; pointer-events:none;
  }
  .hello-overlay.show{ opacity:1; pointer-events:auto; animation:overlayFade 3.4s ease-in-out forwards; }
  @keyframes overlayFade{ 0%{ opacity:0; } 10%{ opacity:1; } 82%{ opacity:1; } 100%{ opacity:0; } }
  .hello-text{
    font-family:'Dancing Script',cursive; font-weight:700; color:#fff;
    font-size:clamp(2.1rem,7vw,4.2rem); text-align:center;
    opacity:0; transform:scale(.8); text-shadow:0 0 30px rgba(255,255,255,.35);
  }
  .hello-overlay.show .hello-text{ animation:helloPop 3.4s cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes helloPop{
    0%{ opacity:0; transform:scale(.8); }
    22%{ opacity:1; transform:scale(1); }
    78%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.05); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.2s !important; }
  }
</style>
</head>
<body>

<div class="stage">

  <div class="wonders-sky" aria-hidden="true">
    <div class="stars"></div>

    <div class="flyer" style="top:7%; animation-duration:38s;">
      <svg width="46" height="24" viewBox="0 0 46 24"><path d="M2 14 L20 13 L30 4 L34 4 L29 13 L40 13 L44 10 L46 10 L43 15 L46 17 L44 17 L40 15 L29 15 L34 22 L30 22 L20 16 L2 16 Z" fill="none" stroke="#f7ecd9" stroke-width="1.6" stroke-linejoin="round"/></svg>
    </div>
    <div class="flyer bob" style="top:4%; animation-duration:52s; animation-delay:-15s;">
      <svg width="50" height="64" viewBox="0 0 50 64"><path d="M25 2 C10 2 4 20 11 32 C15 39 14 42 14 44 L36 44 C36 42 35 39 39 32 C46 20 40 2 25 2 Z" fill="none" stroke="#f3c34d" stroke-width="2"/><rect x="18" y="48" width="14" height="10" rx="2" fill="none" stroke="#f7ecd9" stroke-width="2"/><line x1="16" y1="44" x2="18" y2="48" stroke="#f7ecd9" stroke-width="1.5"/><line x1="34" y1="44" x2="32" y2="48" stroke="#f7ecd9" stroke-width="1.5"/></svg>
    </div>
    <div class="flyer" style="top:12%; animation-duration:60s; animation-delay:-30s;">
      <svg width="120" height="50" viewBox="0 0 120 50"><ellipse cx="35" cy="32" rx="30" ry="14" fill="#fff" opacity=".5"/><ellipse cx="65" cy="26" rx="24" ry="18" fill="#fff" opacity=".5"/><ellipse cx="90" cy="34" rx="18" ry="11" fill="#fff" opacity=".5"/></svg>
    </div>

    <div class="skyline">
      <svg viewBox="0 0 1000 380" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="360" x2="1000" y2="360" class="ground-line"/>

        <g class="wonder-mark sway-slow" transform="translate(10,250)">
          <path d="M0 110 L25 95 L50 105 L75 90 L100 100 L125 88 L150 96"/>
          <rect x="18" y="78" width="12" height="14"/>
          <rect x="68" y="73" width="12" height="14"/>
          <rect x="118" y="71" width="12" height="14"/>
        </g>

        <g class="wonder-mark sway-slow" transform="translate(150,210)" style="animation-delay:-2s;">
          <rect x="20" y="90" width="90" height="55"/>
          <path d="M65 30 C90 60 90 90 65 100 C40 90 40 60 65 30 Z"/>
          <circle cx="65" cy="26" r="4" class="accent blink"/>
          <rect x="2" y="115" width="14" height="30"/>
          <circle cx="9" cy="110" r="8"/>
          <rect x="124" y="115" width="14" height="30"/>
          <circle cx="131" cy="110" r="8"/>
        </g>

        <g class="tower-mark bob" transform="translate(395,40)" style="animation-duration:6s;">
          <path d="M110 0
                   L70 150 L40 150
                   L92 210 L20 210
                   L100 270 L0 320 L220 320 L120 270
                   L198 210 L126 210
                   L178 150 L150 150 Z"/>
          <line x1="40" y1="150" x2="178" y2="150"/>
          <line x1="20" y1="210" x2="198" y2="210"/>
          <line x1="60" y1="90" x2="158" y2="90"/>
          <line x1="0" y1="320" x2="220" y2="320"/>
          <line x1="56" y1="320" x2="110" y2="60" stroke-dasharray="2 6" stroke-width="1.6" opacity=".6"/>
          <line x1="164" y1="320" x2="110" y2="60" stroke-dasharray="2 6" stroke-width="1.6" opacity=".6"/>
          <circle cx="110" cy="-6" r="4" class="accent blink"/>
        </g>

        <g class="wonder-mark sway-slow" transform="translate(640,225)" style="animation-delay:-4s;">
          <path d="M0 115 Q0 35 95 30 Q190 35 190 115 Z"/>
          <g stroke-width="2">
            <line x1="14" y1="65" x2="14" y2="100"/>
            <line x1="38" y1="55" x2="38" y2="100"/>
            <line x1="62" y1="48" x2="62" y2="100"/>
            <line x1="86" y1="44" x2="86" y2="100"/>
            <line x1="110" y1="44" x2="110" y2="100"/>
            <line x1="134" y1="48" x2="134" y2="100"/>
            <line x1="158" y1="55" x2="158" y2="100"/>
            <line x1="178" y1="65" x2="178" y2="100"/>
          </g>
        </g>

        <g class="wonder-mark sway-slow" transform="translate(845,225)" style="animation-delay:-1s;">
          <rect x="34" y="55" width="9" height="60"/>
          <rect x="6" y="50" width="65" height="8" rx="3"/>
          <circle cx="38" cy="35" r="11"/>
          <path d="M14 115 Q38 80 62 115 Z"/>
        </g>

        <g class="walker" style="bottom:0; left:0; animation-duration:22s;">
          <g class="wonder-mark" transform="translate(0,330)">
            <rect x="0" y="0" width="46" height="20" rx="3"/>
            <line x1="10" y1="0" x2="10" y2="20"/>
            <line x1="22" y1="0" x2="22" y2="20"/>
            <circle cx="10" cy="22" r="4" class="accent"/>
            <circle cx="36" cy="22" r="4" class="accent"/>
          </g>
        </g>

        <g class="walker" style="bottom:0; left:0; animation-duration:30s; animation-delay:-8s;">
          <g class="wonder-mark" transform="translate(700,330)">
            <circle cx="0" cy="8" r="5"/>
            <line x1="0" y1="13" x2="0" y2="28"/>
            <line x1="-5" y1="20" x2="5" y2="20"/>
            <line x1="0" y1="28" x2="-5" y2="36"/>
            <line x1="0" y1="28" x2="5" y2="36"/>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <div class="header">
    <div class="eyebrow">a little something, just for you</div>
    <h1>Happy 26th Birthday</h1>
    <p>A wide world still waiting to be photographed by you. Press the shutter when you're ready.</p>
  </div>

  <div class="camera-zone">
    <div class="scene3d">
      <div class="camera" id="camera">

        <!-- FRONT FACE: hand-built SVG, pink instax mini styling -->
        <div class="face face-front">
          <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bodyPink" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffd3df"/>
                <stop offset="55%" stop-color="#f7a8bf"/>
                <stop offset="100%" stop-color="#ef8aab"/>
              </linearGradient>
              <radialGradient id="lensOuter" cx="38%" cy="32%" r="70%">
                <stop offset="0%" stop-color="#fdfdfd"/>
                <stop offset="45%" stop-color="#cfd3d6"/>
                <stop offset="100%" stop-color="#8d939c"/>
              </radialGradient>
              <radialGradient id="lensInner" cx="40%" cy="35%" r="70%">
                <stop offset="0%" stop-color="#5c6b86"/>
                <stop offset="60%" stop-color="#222733"/>
                <stop offset="100%" stop-color="#08090d"/>
              </radialGradient>
              <linearGradient id="flashBulb" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fffdf2"/>
                <stop offset="100%" stop-color="#ffe9a8"/>
              </linearGradient>
            </defs>

            <!-- body -->
            <rect x="8" y="8" width="284" height="284" rx="46" fill="url(#bodyPink)" stroke="#d9728f" stroke-width="3"/>
            <!-- top strap rings -->
            <circle cx="34" cy="34" r="9" fill="none" stroke="#d9728f" stroke-width="3"/>
            <circle cx="266" cy="34" r="9" fill="none" stroke="#d9728f" stroke-width="3"/>
            <!-- viewfinder -->
            <rect x="34" y="56" width="46" height="28" rx="6" fill="#fff7fa" stroke="#d9728f" stroke-width="2.5"/>
            <!-- flash -->
            <rect x="214" y="50" width="50" height="50" rx="10" fill="url(#flashBulb)" stroke="#d9728f" stroke-width="2.5"/>
            <!-- brand -->
            <text x="150" y="50" text-anchor="middle" font-family="Quicksand, sans-serif" font-weight="700" font-size="17" fill="#9c3f5c" letter-spacing="2">instax mini</text>
            <!-- lens housing -->
            <circle cx="150" cy="186" r="98" fill="url(#bodyPink)" stroke="#d9728f" stroke-width="3"/>
            <circle cx="150" cy="186" r="82" fill="url(#lensOuter)" stroke="#7c828c" stroke-width="2"/>
            <circle cx="150" cy="186" r="58" fill="url(#lensInner)"/>
            <circle cx="128" cy="160" r="14" fill="#fff" opacity=".55"/>
            <!-- small dial marks -->
            <g stroke="#7c828c" stroke-width="2">
              <line x1="150" y1="104" x2="150" y2="114"/>
              <line x1="150" y1="258" x2="150" y2="268"/>
              <line x1="68" y1="186" x2="78" y2="186"/>
              <line x1="222" y1="186" x2="232" y2="186"/>
            </g>
            <!-- shutter button -->
            <circle cx="241" cy="248" r="27" fill="#e8607d" stroke="#a8334f" stroke-width="3"/>
            <circle cx="241" cy="248" r="27" fill="none" stroke="#fff" stroke-width="1.5" opacity=".4"/>
          </svg>
          <button class="power-btn pulsing" id="frontBtn" aria-label="Start photo display"></button>
          <div class="shutter-tag">tap the shutter ↑</div>
          <div class="frontFlash" id="frontFlash"></div>
        </div>

        <!-- BACK FACE: hand-built SVG -->
        <div class="face face-back">
          <div class="back-stage">
            <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="bodyPinkBack" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffe1ea"/>
                  <stop offset="55%" stop-color="#f9b6c9"/>
                  <stop offset="100%" stop-color="#f093ae"/>
                </linearGradient>
              </defs>
              <rect x="8" y="8" width="284" height="284" rx="46" fill="url(#bodyPinkBack)" stroke="#d9728f" stroke-width="3"/>
              <!-- film door -->
              <rect x="20" y="24" width="210" height="240" rx="16" fill="#fdf5f7" stroke="#d9728f" stroke-width="3"/>
              <!-- hinge dot -->
              <circle cx="246" cy="40" r="7" fill="none" stroke="#d9728f" stroke-width="3"/>
              <!-- brand -->
              <text x="258" y="200" text-anchor="middle" font-family="Quicksand, sans-serif" font-weight="700" font-size="12" fill="#9c3f5c" letter-spacing="1" transform="rotate(90 258 200)">instax mini</text>
              <!-- feet -->
              <rect x="50" y="262" width="26" height="10" rx="4" fill="#d9728f" opacity=".5"/>
              <rect x="224" y="262" width="26" height="10" rx="4" fill="#d9728f" opacity=".5"/>
            </svg>

            <div class="photo-screen">
              <div class="screen-flash" id="screenFlash"></div>
              <div class="film-frame" id="filmFrame">
                <div class="film-photo"><img id="photoImg" src="" alt="memory"></div>
                <div class="film-caption" id="photoCaption">caption</div>
              </div>
              <div class="card-frame" id="cardFrame">
                <img id="cardImg",  src = "irc/img6.png", alt="birthday card">
              </div>
            </div>

            <div class="controls-col">
              <div class="counter" id="counter">1 / 7</div>
              <button class="ctrl-btn next-btn" id="nextBtn">NEXT ▸</button>
              <button class="ctrl-btn cview-btn" id="cviewBtn">C VIEW</button>
              <button class="ctrl-btn" id="offBtn" style="display:none;">TURN OFF ⏻</button>
            </div>

            <div class="cview-pop" id="cviewPop"></div>
          </div>
        </div>

      </div>
    </div>

    <div class="hint" id="hint">tap the shutter button to begin ↑</div>
  </div>

  <footer>made with <span class="heart">♥</span> for the best travel partner there is</footer>
</div>

<div class="hello-overlay" id="helloOverlay">
  <div class="hello-text">Happy birthday Ammu</div>
</div>

<script>
(function(){
  const photos = [
    { src: "irc/img1.jpeg", caption: "Remember this one, One monday you send wishing good morning! It was the first time I actually saw you after 2020" },
    { src: "irc/img2.jpeg", caption: "One of my favourites. Makes me feel you are looking right into my eyes! Hallucinating one!!" },
    { src: "irc/img3.jpeg", caption: "This one always give me the fun & creative architect vibes!!" },
    { src: "irc/img4.jpeg", caption: "You and your black dress. This one here takes me back to that Little Ammu I saw during childhood days." },
    { src: "irc/img5.jpeg", caption: "This got to be the special one. I think this might have triggered few future events!!" }
  ];

  const card = { type: "card"};
  const video = { type: "video", src: "irc/ammu.mov" };

  const sequence = [...photos, card, video];
  const total = sequence.length;
  let index = -1;
  let cviewOpen = false;

  const camera = document.getElementById('camera');
  const frontBtn = document.getElementById('frontBtn');
  const frontFlash = document.getElementById('frontFlash');
  const screenFlash = document.getElementById('screenFlash');
  const filmFrame = document.getElementById('filmFrame');
  const cardFrame = document.getElementById('cardFrame');
  const nextBtn = document.getElementById('nextBtn');
  const cviewBtn = document.getElementById('cviewBtn');
  const offBtn = document.getElementById('offBtn');
  const counter = document.getElementById('counter');
  const cviewPop = document.getElementById('cviewPop');
  const hint = document.getElementById('hint');
  const helloOverlay = document.getElementById('helloOverlay');

  function updateDots(){}

  function flashScreen(cb){
    screenFlash.classList.remove('fire');
    void screenFlash.offsetWidth;
    screenFlash.classList.add('fire');
    setTimeout(cb, 180);
  }

  function clearStage(){
    filmFrame.classList.remove('show');
    cardFrame.classList.remove('show');
    cviewPop.classList.remove('show');
    cviewOpen = false;
  }

  function renderCurrent(){
    clearStage();
    const item = sequence[index];

    flashScreen(() => {
      if (item.type === 'card') {
        cardFrame.classList.add('show');
        cviewBtn.style.display = 'none';
      } else if (item.type === 'video') {
        const wrap = document.querySelector('.film-photo');
        wrap.innerHTML = '<video id="memVideo" autoplay loop muted playsinline></video>';
        const vid = document.getElementById('memVideo');
        if (item.src) { vid.src = item.src; }
        filmFrame.classList.add('show');
        document.getElementById('photoCaption').textContent = "and the adventure keeps rolling...";
        cviewBtn.style.display = 'inline-block';
        cviewBtn.disabled = false;
      } else {
        const wrap = document.querySelector('.film-photo');
        if (!document.getElementById('photoImg')) {
          wrap.innerHTML = '<img id="photoImg" src="" alt="memory">';
        }
        const img = document.getElementById('photoImg');
        img.src = item.src;
        document.getElementById('photoCaption').textContent = "memory " + (index+1) + " of " + photos.length;
        filmFrame.classList.add('show');
        cviewBtn.style.display = 'inline-block';
        cviewBtn.disabled = false;
      }
    });

    counter.textContent = (index+1) + " / " + total;
    updateDots();

    if (index === total - 1) {
      nextBtn.style.display = 'none';
      offBtn.style.display = 'inline-block';
    } else {
      nextBtn.style.display = 'inline-block';
      offBtn.style.display = 'none';
    }
  }

  function startSequence(){
    frontFlash.classList.remove('fire');
    void frontFlash.offsetWidth;
    frontFlash.classList.add('fire');
    frontBtn.classList.remove('pulsing');
    hint.textContent = "developing...";

    setTimeout(() => {
      camera.classList.add('flipped');
      index = 0;
      setTimeout(renderCurrent, 650);
      hint.textContent = "C VIEW has a story for you";
    }, 320);
  }

  function nextItem(){
    if (index < total - 1) {
      index++;
      renderCurrent();
    }
  }

  function turnOff(){
    helloOverlay.classList.add('show');
    hint.textContent = "";

    setTimeout(() => {
      clearStage();
      camera.classList.remove('flipped');
      index = -1;
      cviewBtn.style.display = 'none';
      updateDots();
    }, 1700);

    setTimeout(() => {
      helloOverlay.classList.remove('show');
      hint.textContent = "tap the shutter button to begin again ↑";
      setTimeout(() => { frontBtn.classList.add('pulsing'); }, 300);
    }, 3500);
  }

  function toggleCview(){
    if (cviewOpen) {
      cviewPop.classList.remove('show');
      cviewOpen = false;
      return;
    }
    const item = sequence[index];
    let text = "";
    if (item.type === 'video') {
      text = "The only video I shot on our outing, it was fun watching you do pottery and Those beautiful curls clipped up!";
    } else {
      text = item.caption;
    }
    cviewPop.textContent = text;
    cviewPop.classList.add('show');
    cviewOpen = true;
  }

  frontBtn.addEventListener('click', startSequence);
  nextBtn.addEventListener('click', nextItem);
  offBtn.addEventListener('click', turnOff);
  cviewBtn.addEventListener('click', toggleCview);

  updateDots();
})();
</script>

</body>
</html>
